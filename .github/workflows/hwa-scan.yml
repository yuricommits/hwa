name: HWA Security Scan

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan for vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|py|go)$' \
            | tr '\n' ' ' \
            > changed_files.txt
          echo "files=$(cat changed_files.txt)" >> $GITHUB_OUTPUT
          echo "Changed files:"
          cat changed_files.txt

      - name: Install hwa CLI
        run: |
          curl -L https://github.com/yuricommits/hwa/releases/download/v0.1.0/hwa-linux-amd64 \
            -o /usr/local/bin/hwa
          chmod +x /usr/local/bin/hwa
          hwa version

      - name: Run HWA scan
        id: scan
        run: |
          FILES="${{ steps.changed.outputs.files }}"

          if [ -z "$FILES" ]; then
            echo "No supported files changed, skipping scan"
            echo '{"vulnerabilities":[]}' > hwa-results.json
            echo "found_critical=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Run scan and save JSON results
          hwa scan $FILES --json > hwa-results.json 2>&1 || true

          # Check for criticals
          CRITICAL_COUNT=$(cat hwa-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list):
            print(len([x for x in data if x.get('severity') == 'critical']))
          else:
            print(0)
          ")

          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "found_critical=true" >> $GITHUB_OUTPUT
          else
            echo "found_critical=false" >> $GITHUB_OUTPUT
          fi

          cat hwa-results.json

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hwa-scan-results
          path: hwa-results.json
          retention-days: 30

      - name: Comment findings on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('hwa-results.json', 'utf8'));

            if (!Array.isArray(results) || results.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## ✅ HWA Security Scan\n\nNo vulnerabilities found in changed files.'
              });
              return;
            }

            const severityIcon = {
              critical: '🔴',
              high: '🟠',
              medium: '🟡',
              low: '🔵'
            };

            const critical = results.filter(r => r.severity === 'critical');
            const high = results.filter(r => r.severity === 'high');
            const medium = results.filter(r => r.severity === 'medium');
            const low = results.filter(r => r.severity === 'low');

            let body = `## ${critical.length > 0 ? '🚨' : '⚠️'} HWA Security Scan\n\n`;

            if (critical.length > 0) {
              body += `> **${critical.length} critical finding(s) — this PR is blocked until resolved.**\n\n`;
            }

            body += `| Severity | Count |\n|---|---|\n`;
            if (critical.length) body += `| 🔴 Critical | ${critical.length} |\n`;
            if (high.length) body += `| 🟠 High | ${high.length} |\n`;
            if (medium.length) body += `| 🟡 Medium | ${medium.length} |\n`;
            if (low.length) body += `| 🔵 Low | ${low.length} |\n`;
            body += `\n### Findings\n\n`;

            for (const r of results) {
              const icon = severityIcon[r.severity] ?? '⚪';
              body += `**${icon} ${r.severity.toUpperCase()}** — \`${r.file}\` L${r.line}\n`;
              body += `${r.description}\n`;
              body += `> → ${r.suggestion}\n\n`;
            }

            body += `---\n*Scanned by [hwa](https://github.com/yuricommits/hwa) · [View full report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Block PR on critical findings
        if: steps.scan.outputs.found_critical == 'true'
        run: |
          echo "::error::HWA found ${{ steps.scan.outputs.critical_count }} critical vulnerability(s). Fix them before merging."
          exit 1
